name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - auto
          - patch
          - minor
          - major

permissions:
  contents: write
  actions: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo build --force

      - name: Verify build
        run: |
          BACKEND_SIZE=$(stat -c%s packages/backend/dist/index.js 2>/dev/null || stat -f%z packages/backend/dist/index.js)
          echo "Backend bundle size: ${BACKEND_SIZE} bytes"
          if [ "$BACKEND_SIZE" -lt 50000 ]; then
            echo "ERROR: Backend not properly bundled (size: ${BACKEND_SIZE})"
            exit 1
          fi

      - name: Determine version bump
        id: bump
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current=${CURRENT_VERSION}" >> $GITHUB_OUTPUT

          # Get bump type
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.bump }}" != "auto" ]; then
            BUMP_TYPE="${{ inputs.bump }}"
          else
            # Auto-detect from commit messages since last tag
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

            if [ -z "$LAST_TAG" ]; then
              COMMITS=$(git log --oneline --pretty=format:"%s")
            else
              COMMITS=$(git log "${LAST_TAG}..HEAD" --oneline --pretty=format:"%s")
            fi

            # No new commits since last tag
            if [ -z "$COMMITS" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi

            # Only release for feat, fix, or BREAKING CHANGE commits
            if echo "$COMMITS" | grep -qiE "^feat(\(.+\))?!:|BREAKING CHANGE"; then
              BUMP_TYPE="major"
            elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
              BUMP_TYPE="minor"
            elif echo "$COMMITS" | grep -qiE "^fix(\(.+\))?:"; then
              BUMP_TYPE="patch"
            else
              echo "No releasable commits (feat/fix/BREAKING CHANGE) — skipping"
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          echo "type=${BUMP_TYPE}" >> $GITHUB_OUTPUT

          # Calculate next version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          case "$BUMP_TYPE" in
            major) NEXT_VERSION="$((MAJOR + 1)).0.0" ;;
            minor) NEXT_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac

          echo "next=${NEXT_VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${CURRENT_VERSION} → ${NEXT_VERSION} (${BUMP_TYPE})"

      - name: Update version in package.json
        if: steps.bump.outputs.skip != 'true'
        run: |
          VERSION="${{ steps.bump.outputs.next }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Create release package
        if: steps.bump.outputs.skip != 'true'
        run: |
          VERSION="${{ steps.bump.outputs.next }}"
          RELEASE_DIR="remnant-${VERSION}"

          mkdir -p "${RELEASE_DIR}/packages/backend"
          mkdir -p "${RELEASE_DIR}/packages/frontend"
          mkdir -p "${RELEASE_DIR}/packages/shared"
          cp -r packages/backend/dist "${RELEASE_DIR}/packages/backend/"
          cp packages/backend/package.json "${RELEASE_DIR}/packages/backend/"

          cp -r packages/frontend/dist "${RELEASE_DIR}/packages/frontend/"
          cp packages/frontend/package.json "${RELEASE_DIR}/packages/frontend/"

          cp -r packages/shared/dist "${RELEASE_DIR}/packages/shared/"
          cp packages/shared/package.json "${RELEASE_DIR}/packages/shared/"

          cp package.json "${RELEASE_DIR}/"
          cp pnpm-lock.yaml "${RELEASE_DIR}/"
          cp pnpm-workspace.yaml "${RELEASE_DIR}/"
          cp turbo.json "${RELEASE_DIR}/"

          cp -r scripts "${RELEASE_DIR}/"

          cat > "${RELEASE_DIR}/setup.sh" << 'EOF'
          #!/bin/bash
          set -e
          cd "$(dirname "$0")"
          pnpm install --prod --frozen-lockfile
          echo "Setup complete!"
          EOF
          chmod +x "${RELEASE_DIR}/setup.sh"

          tar -czvf "remnant-${VERSION}.tar.gz" "${RELEASE_DIR}"
          sha256sum "remnant-${VERSION}.tar.gz" > "remnant-${VERSION}.tar.gz.sha256"

      - name: Commit version bump
        if: steps.bump.outputs.skip != 'true'
        run: |
          VERSION="${{ steps.bump.outputs.next }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "release: v${VERSION}"
          git tag "v${VERSION}"
          git push origin main --tags

      - name: Create GitHub Release
        if: steps.bump.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.next }}
          files: |
            remnant-${{ steps.bump.outputs.next }}.tar.gz
            remnant-${{ steps.bump.outputs.next }}.tar.gz.sha256
          generate_release_notes: true
          draft: false

      - name: Trigger public sync
        if: steps.bump.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run sync-public.yml

      - name: Notify Discord
        if: steps.bump.outputs.skip != 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          [ -z "$DISCORD_WEBHOOK_URL" ] && exit 0
          VERSION="v${{ steps.bump.outputs.next }}"
          REPO="${{ github.repository }}"
          curl -f -H "Content-Type: application/json" \
            -d "{\"content\":\"**Remnant ${VERSION}** released\\nhttps://github.com/${REPO}/releases/tag/${VERSION}\"}" \
            "$DISCORD_WEBHOOK_URL"

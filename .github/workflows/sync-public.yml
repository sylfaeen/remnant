name: Sync to public repo

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: sync-public
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect release
        id: release
        run: |
          LAST_MSG=$(git log -1 --format='%s')
          if echo "$LAST_MSG" | grep -qE '^release: v[0-9]+\.[0-9]+\.[0-9]+$'; then
            VERSION=$(echo "$LAST_MSG" | sed 's/release: //')
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "Detected release: ${VERSION}"
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "Not a release commit"
          fi

      - name: Remove private files
        run: |
          rm -rf .claude .cursor .tessl .agents .run .local _bmad _bmad-output .github/skills .mcp.json tessl.json
          rm -f CLAUDE.md .env.development .github/workflows/sync-public.yml .github/workflows/release.yml scripts/dev-server.sh Dockerfile.server
          mv README.public.md README.md

      - name: Verify no private files remain
        run: |
          EXIT=0
          for item in .claude .cursor .tessl .local _bmad _bmad-output .github/skills .mcp.json tessl.json CLAUDE.md .env.development .github/workflows/sync-public.yml .github/workflows/release.yml; do
            if [ -e "$item" ]; then
              echo "::error::Private file still present: $item"
              EXIT=1
            fi
          done
          exit $EXIT

      - name: Push to public repo
        env:
          PUBLIC_REPO_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
          PUBLIC_REPO: ${{ vars.PUBLIC_REPO }}
        run: |
          git config --unset-all http.https://github.com/.extraheader || true

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git diff --staged --quiet && echo "No changes to sync" && exit 0
          git commit -m "sync: mirror $(git log -1 --format='%h %s' HEAD)"

          git remote add public "https://x-access-token:${PUBLIC_REPO_TOKEN}@github.com/${PUBLIC_REPO}.git"
          git push public main --force

      - name: Create release on public repo
        if: steps.release.outputs.is_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
          PUBLIC_REPO: ${{ vars.PUBLIC_REPO }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          git tag -f "${VERSION}"
          git push public "${VERSION}" --force

          gh release download "${VERSION}" --dir ./release-assets || true

          if ls ./release-assets/* 1>/dev/null 2>&1; then
            gh release create "${VERSION}" ./release-assets/* \
              --repo "${PUBLIC_REPO}" \
              --title "${VERSION}" \
              --generate-notes
          else
            gh release create "${VERSION}" \
              --repo "${PUBLIC_REPO}" \
              --title "${VERSION}" \
              --generate-notes
          fi

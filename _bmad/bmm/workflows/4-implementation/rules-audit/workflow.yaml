# Rules Audit Workflow
name: rules-audit
description: 'Scan the codebase against all rules defined in .claude/rules/. Reports violations with file:line references.'

# Critical variables from config
config_source: "{project-root}/_bmad/bmm/config.yaml"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
user_skill_level: "{config_source}:user_skill_level"
document_output_language: "{config_source}:document_output_language"
date: system-generated

# Workflow components
installed_path: "{project-root}/_bmad/bmm/workflows/4-implementation/rules-audit"
instructions: "{installed_path}/instructions.xml"
template: false
execution_mode: yolo-until-ask

# Rules location
rules_folder: "{project-root}/.claude/rules"
rules_template: "{rules_folder}/RULE_TEMPLATE.md"
